# StackHost configuration for manhwa-bot
user:
  name: YourName
  github: YourGitHubUsername

runtime:
  image: puppeteer/puppeteer:latest   # Node 20 + full Chromium + all dependencies

commands:
  # No extra apt packages needed – the image already has everything
  package: ""
  build:
    - npm install
  start: node bot_queue.js

repository:
  branch: main
  auto_deploy: true

env:
  - BOT_TOKEN:YOUR_BOT_TOKEN
  - CHAT_ID:YOUR_CHAT_ID
