user:
  name: YourName
  github: YourGitHubUsername

runtime:
  image: node:22

commands:
  # All the libraries Chromium needs (space‑separated, exactly as the schema wants)
  package: ca-certificates fonts-liberation libasound2 libatk-bridge2.0-0 libatk1.0-0 libcups2 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 libu2f-udev libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 xdg-utils

  build:
    - npm install

  start: node --max-old-space-size=384 bot_queue.js

repository:
  branch: main
  auto_deploy: true

env:
  - BOT_TOKEN:YOUR_BOT_TOKEN
  - CHAT_ID:YOUR_CHAT_ID
